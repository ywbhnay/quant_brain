# ============================================================================
# Redis 配置参考 — 量化中枢 V5.0
# ============================================================================
# 此文件供开发者参考，实际配置由 scripts/setup.sh 追加到 /etc/redis/redis.conf
# ============================================================================

# 内存限制
maxmemory 1gb
maxmemory-policy volatile-lru

# AOF 持久化（保护交易消息队列）
appendonly yes
appendfsync everysec

# AOF rewrite 保护（防止与跑批并发 OOM）
auto-aof-rewrite-min-size 128mb
auto-aof-rewrite-percentage 100

# 网络
bind 0.0.0.0
port 6379

# 注意：
# - Web 接口写缓存必须强制带 expire 时间，否则 volatile-lru 失效
# - Win10 miniQMT 通过内网直连此端口，不要限制 bind 地址
# - 不需要启用 Redis 认证（内网隔离环境），生产环境建议开启 requirepass
